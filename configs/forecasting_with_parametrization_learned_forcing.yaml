training:
  batch_size: 128
  max_epochs: 200

model:
  architecture: "UNet"
  learning_rate: 5e-3
  n_input_scalar_components: 2
  n_output_scalar_components: 2
  time_history: 1
  time_future: 1
  hidden_channels: 32
  activation: "leaky relu"

data:
  num_workers: 5
  data_dir: "/mnt/SSD2/constantin/data/pyqg"
  data_generation: "pyqg_leadtime_100hours"
  lead_time: 1

pipeline:
  highres_forecasting: False
  add_parametrization: True
  add_highres_encoding: False
  add_forcing: False
  parametrization_path: '/mnt/SSD2/constantin/subgrid_modelling/checkpoints/parametrization/model-53-val_MSE0.12.ckpt'
  autoregressive: False
  joint_training: True
